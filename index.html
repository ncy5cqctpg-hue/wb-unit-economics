<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Калькулятор упаковки для WB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 24px;
    }
    .field {
      margin-bottom: 12px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
      font-weight: 500;
    }
    input, select, button {
      font-size: 14px;
      padding: 8px 10px;
      border-radius: 4px;
      border: 1px solid #ccc;
      width: 100%;
      box-sizing: border-box;
    }
    button {
      width: auto;
      cursor: pointer;
      background: #4f46e5;
      color: #fff;
      border-color: #4f46e5;
    }
    button:disabled {
      opacity: 0.6;
      cursor: default;
    }
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .row .field {
      flex: 1;
      min-width: 140px;
    }
    .hint {
      font-size: 12px;
      color: #666;
    }
    .status {
      margin-top: 8px;
      font-size: 13px;
    }
    .status.error {
      color: #b91c1c;
    }
    .status.success {
      color: #15803d;
    }
    .history-block {
      margin-top: 20px;
      border-top: 1px solid #e5e5e5;
      padding-top: 12px;
    }
    .history-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .history-item img {
      width: 60px;
      height: 80px;
      border-radius: 4px;
      object-fit: cover;
      background: #eee;
    }
    .history-item a {
      color: #2563eb;
      text-decoration: none;
      font-size: 13px;
    }
    .history-item a:hover {
      text-decoration: underline;
    }
    .history-meta {
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Калькулятор упаковки для WB</h1>

    <!-- Ссылка на товар WB -->
    <div class="field">
      <label for="productUrl">Ссылка на товар Wildberries</label>
      <input id="productUrl" type="text" placeholder="https://www.wildberries.ru/catalog/553101632/detail.aspx" />
      <div class="hint">Вставьте ссылку на товар с сайта WB — мы сохраним превью товара в истории.</div>
    </div>

    <div class="field">
      <button type="button" id="btnWbAdd">Добавить по ссылке WB</button>
      <div id="wbStatus" class="status"></div>
    </div>

    <hr />

    <!-- Габариты -->
    <div class="row">
      <div class="field">
        <label for="lengthCm">Длина, см</label>
        <input id="lengthCm" type="number" step="0.1" />
      </div>
      <div class="field">
        <label for="widthCm">Ширина, см</label>
        <input id="widthCm" type="number" step="0.1" />
      </div>
      <div class="field">
        <label for="heightCm">Высота, см</label>
        <input id="heightCm" type="number" step="0.1" />
      </div>
    </div>

    <!-- Категории (оставляем под твой текущий калькулятор) -->
    <div class="row">
      <div class="field">
        <label for="parentCategory">Родительская категория</label>
        <input id="parentCategory" type="text" />
      </div>
      <div class="field">
        <label for="category">Категория</label>
        <input id="category" type="text" />
      </div>
    </div>

    <div class="field">
      <div class="hint">
        Ниже можно выводить результаты расчётов и любую дополнительную информацию твоего калькулятора.
      </div>
    </div>

    <!-- История проверок -->
    <div class="history-block">
      <label>История проверок</label>
      <div id="historyContainer" class="history-container">
        <!-- сюда будут добавляться карточки истории -->
      </div>
    </div>
  </div>

  <script>
    // В памяти: список проверок (можно потом сохранить в localStorage, если захочешь)
    const historyItems = [];

    document.getElementById('btnWbAdd').addEventListener('click', handleWbImage);

    async function handleWbImage() {
      const statusEl = document.getElementById('wbStatus');
      const btn = document.getElementById('btnWbAdd');
      const urlInput = document.getElementById('productUrl');
      const wbUrl = urlInput.value.trim();

      statusEl.textContent = '';
      statusEl.className = 'status';

      if (!wbUrl) {
        statusEl.textContent = 'Введите ссылку на товар WB.';
        statusEl.classList.add('error');
        return;
      }

      btn.disabled = true;
      statusEl.textContent = 'Получаем данные товара...';

      try {
        const resp = await fetch(`/api/wb-card?url=${encodeURIComponent(wbUrl)}`);
        const data = await resp.json();

        if (!resp.ok) {
          console.error('API error', data);
          statusEl.textContent = data.error || 'Не удалось получить данные с WB.';
          statusEl.classList.add('error');
          return;
        }

        // Собираем запись для истории
        const item = {
          timestamp: new Date().toISOString(),
          productUrl: data.productUrl || wbUrl,
          nmId: data.nmId,
          imageUrl: data.imageUrl || null,
          lengthCm: document.getElementById('lengthCm')?.value || null,
          widthCm: document.getElementById('widthCm')?.value || null,
          heightCm: document.getElementById('heightCm')?.value || null,
          parentCategory: document.getElementById('parentCategory')?.value || null,
          category: document.getElementById('category')?.value || null,
        };

        // Добавляем в начало истории
        historyItems.unshift(item);
        renderHistory();

        statusEl.textContent = data.imageUrl
          ? `Товар ${data.nmId} добавлен в историю (изображение найдено).`
          : `Товар ${data.nmId} добавлен в историю (изображение найти не удалось).`;
        statusEl.classList.add('success');
      } catch (e) {
        console.error(e);
        statusEl.textContent = 'Ошибка при обращении к API.';
        statusEl.classList.add('error');
      } finally {
        btn.disabled = false;
      }
    }

    function renderHistory() {
      const container = document.getElementById('historyContainer');
      container.innerHTML = '';

      if (historyItems.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'hint';
        empty.textContent = 'Пока нет проверенных товаров.';
        container.appendChild(empty);
        return;
      }

      historyItems.forEach((item) => {
        const div = document.createElement('div');
        div.className = 'history-item';

        if (item.imageUrl) {
          const img = document.createElement('img');
          img.src = item.imageUrl;
          img.alt = item.nmId || '';
          img.loading = 'lazy';
          div.appendChild(img);
        }

        const info = document.createElement('div');

        const title = document.createElement('div');
        title.innerHTML = `<strong>Артикул: ${item.nmId || '—'}</strong>`;
        info.appendChild(title);

        const link = document.createElement('div');
        const a = document.createElement('a');
        a.href = item.productUrl;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.textContent = 'Открыть товар на WB';
        link.appendChild(a);
        info.appendChild(link);

        const meta = document.createElement('div');
        meta.className = 'history-meta';
        const dims = [
          item.lengthCm ? `Д: ${item.lengthCm} см` : null,
          item.widthCm ? `Ш: ${item.widthCm} см` : null,
          item.heightCm ? `В: ${item.heightCm} см` : null,
        ].filter(Boolean).join(', ');
        const cats = [
          item.parentCategory || null,
          item.category || null,
        ].filter(Boolean).join(' → ');

        let metaText = [];
        if (dims) metaText.push(dims);
        if (cats) metaText.push(`Категория: ${cats}`);
        meta.textContent = metaText.join(' | ') || '';
        info.appendChild(meta);

        div.appendChild(info);
        container.appendChild(div);
      });
    }

    // При загрузке страницы просто показываем пустое состояние истории
    renderHistory();
  </script>
</body>
</html>
